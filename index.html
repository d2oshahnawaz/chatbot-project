<!DOCTYPE html>
<html>
<head>
    <title>Voice Chatbot</title>
    <style>
        body { font-family: Arial; background: #1e1e1e; color: white; text-align: center; }
        #chat { height: 350px; overflow-y: auto; border: 1px solid #444; margin: 20px; padding: 10px; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
        input { padding: 10px; width: 60%; background: #333; color: white; border: none; }
    </style>
</head>
<body>

<h2>🤖 Voice College Chatbot</h2>

<div id="chat"></div>

<input id="msg" placeholder="Type message...">
<button onclick="send()">Send</button>
<button onclick="startVoice()">🎤 Speak</button>

<script>
function sendMessage(message) {
    document.getElementById("chat").innerHTML += "<p><b>You:</b> " + message + "</p>";

    fetch("/get", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("chat").innerHTML += "<p><b>Bot:</b> " + data.reply + "</p>";

        // 🔊 Voice Output
        let speech = new SpeechSynthesisUtterance(data.reply);
        speech.lang = "en-US";
        speech.rate = 1;
        speech.pitch = 1;
        speechSynthesis.speak(speech);
    });
}

function send() {
    let msg = document.getElementById("msg").value;
    if(msg.trim() === "") return;

    sendMessage(msg);
    document.getElementById("msg").value = "";
}

// 🎤 Improved Voice Input
function startVoice() {
    // ✅ Proper define
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("❌ Voice not supported. Use Chrome.");
        return;
    }

    // 🔥 Important fix (voice conflict avoid)
    speechSynthesis.cancel();

    let recognition = new SpeechRecognition();

    recognition.lang = "en-IN"; // India accent better
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.start();

    recognition.onstart = function () {
        console.log("🎤 Listening...");
    };

    recognition.onresult = function (event) {
        let text = event.results[0][0].transcript;
        console.log("You said:", text);

        document.getElementById("msg").value = text;
        sendMessage(text);
    };

    recognition.onerror = function (event) {
        console.error("Error:", event.error);
        alert("Mic error: " + event.error);
    };

    recognition.onend = function () {
        console.log("Voice ended");
    };
}
</script>

</body>
</html>
